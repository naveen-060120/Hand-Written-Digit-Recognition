<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Digit Recognition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #2c3e50;
            color: #ecf0f1;
            width: 100%;
            text-align: center;
            padding: 1rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .canvas-container {
            margin: 20px auto;
            border: 2px solid #34495e;
            border-radius: 4px;
            width: 280px;
            height: 280px;
            background-color: black; /* Important for MNIST compatibility */
            cursor: crosshair;
        }

        canvas {
            display: block;
        }

        .controls {
            display: flex;
            justify-content: space-center;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            color: white;
            transition: background-color 0.3s;
        }

        #clear-btn {
            background-color: #e74c3c;
        }

        #clear-btn:hover {
            background-color: #c0392b;
        }

        #predict-btn {
            background-color: #2ecc71;
        }

        #predict-btn:hover {
            background-color: #27ae60;
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 4px;
            background-color: #ecf0f1;
            font-size: 1.2rem;
            min-height: 30px;
        }

        .loading {
            color: #f39c12;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Handwritten Digit Recognition</h1>
    </header>

    <div class="container">
        <p>Draw a single digit (0-9) inside the box below.</p>
        
        <div class="canvas-container">
            <!-- 280x280 is scaled 10x from 28x28 -->
            <canvas id="canvas" width="280" height="280"></canvas>
        </div>

        <div class="controls">
            <button id="clear-btn">Clear</button>
            <button id="predict-btn">Predict</button>
        </div>

        <div id="result" class="result">
            Prediction will appear here.
        </div>
    </div>

    <!-- Move script to static folder -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
